<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Spiral (Sectors): Sleep radius, GPA color, Stress sector</title>
  <script src="d3.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    .title { font-size: 28px; font-weight: 800; margin: 0 0 6px 0; }
    .msg { color:#0a0; font-weight:700; margin: 8px 0 14px 0; }
    .small { color:#333; margin: 4px 0 0 0; }
  </style>
</head>
<body>

<div class="title">Spiral (one chart): Sleep = radius, GPA = color, Stress = sector + line</div>
<div id="msg" class="msg"></div>
<div id="counts" class="small"></div>

<svg id="chart" width="1100" height="650"></svg>

<script>
const svg = d3.select("#chart");
const W = +svg.attr("width");
const H = +svg.attr("height");

// ---------- Helpers ----------
function pickColumn(row, candidates) {
  for (const c of candidates) {
    if (row[c] != null && String(row[c]).trim() !== "") return c;
  }
  return null;
}

function toNumber(v) {
  const n = Number(String(v).trim());
  return Number.isFinite(n) ? n : NaN;
}

// Stress を 1/2/3 に揃える（ここが Medium 0 の原因になりがち）
function stressToCat(v) {
  const s = String(v).trim().toLowerCase();

  // numeric
  const n = Number(s);
  if (Number.isFinite(n)) {
    // もし 0/1/2 だったら 1/2/3 に寄せる
    if (n === 0) return 1;
    if (n === 1) return 1;
    if (n === 2) return 2;
    if (n === 3) return 3;
    return n; // その他はそのまま
  }

  // string labels（Medium が "Moderate" の可能性があるので追加）
  if (s === "low") return 1;
  if (s === "medium" || s === "med" || s === "moderate") return 2;
  if (s === "high") return 3;

  return NaN;
}

function catLabel(k){
  return k===1 ? "Low" : (k===2 ? "Medium" : "High");
}

// ---------- Load CSV ----------
const msg = document.getElementById("msg");
const countsDiv = document.getElementById("counts");

// ★ここをあなたのCSVパスに合わせる
const CSV_PATH = "data/student_lifestyle_dataset.csv";

d3.csv(CSV_PATH).then(raw => {
  const r0 = raw[0];

  const sleepCol = pickColumn(r0, ["Sleep_Hours_Per_Day","Sleep Hours Per Day","Sleep"]);
  const stressCol = pickColumn(r0, ["Stress_Level","Stress Level","Stress"]);
  const gpaCol   = pickColumn(r0, ["GPA","gpa","Gpa"]);

  const data = raw.map(d => ({
    Sleep: toNumber(d[sleepCol]),
    GPA: toNumber(d[gpaCol]),
    Stress: stressToCat(d[stressCol])
  })).filter(d =>
    Number.isFinite(d.Sleep) && Number.isFinite(d.GPA) && Number.isFinite(d.Stress)
  );

  msg.textContent =
    `Loaded rows: ${data.length}. Columns: Sleep="${sleepCol}", Stress="${stressCol}", GPA="${gpaCol}"`;

  // ---- show stress distribution (重要: Medium 0 ならデータ由来) ----
  const counts = d3.rollup(data, v => v.length, d => d.Stress);
  const c1 = counts.get(1) || 0;
  const c2 = counts.get(2) || 0;
  const c3 = counts.get(3) || 0;
  countsDiv.textContent = `Stress counts -> Low: ${c1}, Medium: ${c2}, High: ${c3}
(もし Medium が 0 なら “データに中間が存在しない or 別ラベル” の可能性が高い)`;

  // ---------- Chart Setup ----------
  svg.selectAll("*").remove();

  const center = { x: W/2, y: H/2 + 10 };
  const outerR = Math.min(W, H) * 0.36;
  const innerR = outerR * 0.15;

  const sleepExtent = d3.extent(data, d=>d.Sleep);
  const gpaExtent = d3.extent(data, d=>d.GPA);

  // radius = Sleep
  const rScale = d3.scaleLinear()
    .domain(sleepExtent)
    .range([innerR, outerR]);

  // color = GPA（濃さ）
  const color = d3.scaleSequential()
    .domain(gpaExtent)   // low GPA -> light, high GPA -> dark
    .interpolator(d3.interpolateBlues);

  // sector angles for stress (3 sectors)
  // Low: 0..120°, Medium: 120..240°, High: 240..360°
  const sector = {
    1: {a0: 0,            a1: 2*Math.PI/3},
    2: {a0: 2*Math.PI/3,  a1: 4*Math.PI/3},
    3: {a0: 4*Math.PI/3,  a1: 2*Math.PI}
  };

  const g = svg.append("g").attr("transform", `translate(${center.x},${center.y})`);

  // ---------- Grid rings (Sleep) ----------
  const ringVals = [5,7,9,10].filter(v => v>=sleepExtent[0] && v<=sleepExtent[1]);

  ringVals.forEach(v=>{
    g.append("circle")
      .attr("r", rScale(v))
      .attr("fill","none")
      .attr("stroke","#ddd")
      .attr("stroke-width", 1);

    g.append("text")
      .attr("x", rScale(v)+6)
      .attr("y", 4)
      .attr("font-size", 14)
      .attr("fill","#666")
      .text(`${v}h`);
  });

  // ---------- Sector boundary lines (Stress) ----------
  [sector[1].a0, sector[2].a0, sector[3].a0].forEach(a=>{
    g.append("line")
      .attr("x1", innerR*Math.cos(a))
      .attr("y1", innerR*Math.sin(a))
      .attr("x2", outerR*Math.cos(a))
      .attr("y2", outerR*Math.sin(a))
      .attr("stroke", "#999")
      .attr("stroke-width", 1.5);
  });

  // Sector labels
  [
    {k:1, text:"Low Stress",   a:(sector[1].a0+sector[1].a1)/2},
    {k:2, text:"Medium Stress",a:(sector[2].a0+sector[2].a1)/2},
    {k:3, text:"High Stress",  a:(sector[3].a0+sector[3].a1)/2},
  ].forEach(s=>{
    g.append("text")
      .attr("x", (outerR+45)*Math.cos(s.a))
      .attr("y", (outerR+45)*Math.sin(s.a))
      .attr("text-anchor", "middle")
      .attr("font-weight", 800)
      .attr("font-size", 18)
      .attr("fill", "#333")
      .text(s.text);
  });

  // ---------- Place points inside each sector ----------
  // angle inside sector = based on Sleep (so it “spirals” within sector) + tiny jitter
  // radius = Sleep
  function polarToXY(r, a){ return [r*Math.cos(a), r*Math.sin(a)]; }

  // For “spiral feeling”: map Sleep -> angle within sector (not random)
  const sleepTo01 = d3.scaleLinear().domain(sleepExtent).range([0, 1]);

  const pts = data.map(d=>{
    const sec = sector[d.Stress] || sector[1];
    const t = sleepTo01(d.Sleep); // 0..1
    const a = sec.a0 + t*(sec.a1-sec.a0) + (Math.random()-0.5)*0.05; // small jitter
    const r = rScale(d.Sleep) + (Math.random()-0.5)*1.2; // tiny radial jitter
    const [x,y] = polarToXY(r,a);
    return {...d, a, r, x, y};
  });

  // ---------- Lines (connect points) ----------
  // 「線を使って」→ 各Stressごとに Sleep で並べて繋ぐ（全員を一本で繋ぐと密すぎるので“サンプル”）
  // サンプル率を下げて見やすくする
  const SAMPLE_EVERY = 6; // 1/6だけ線に使う（必要なら 3 とかにする）

  [1,2,3].forEach(k=>{
    const subset = pts.filter(p=>p.Stress===k)
                      .sort((a,b)=>a.Sleep-b.Sleep)
                      .filter((_,i)=> i % SAMPLE_EVERY === 0);

    if (subset.length < 2) return;

    const line = d3.line()
      .x(d=>d.x)
      .y(d=>d.y)
      .curve(d3.curveCatmullRom.alpha(0.5));

    g.append("path")
      .datum(subset)
      .attr("d", line)
      .attr("fill", "none")
      .attr("stroke", "#444")
      .attr("stroke-opacity", 0.25)
      .attr("stroke-width", 1.2);
  });

  // ---------- Points ----------
  g.selectAll("circle.pt")
    .data(pts)
    .enter()
    .append("circle")
    .attr("class","pt")
    .attr("cx", d=>d.x)
    .attr("cy", d=>d.y)
    .attr("r", 4)
    .attr("fill", d=>color(d.GPA))
    .attr("opacity", 0.75);

  // ---------- Color legend (GPA) ----------
  const legend = svg.append("g").attr("transform", `translate(${W-120},${70})`);
  legend.append("text").text("GPA").attr("font-weight",800).attr("font-size",18);

  const lgH = 160, lgW = 14;
  const defs = svg.append("defs");
  const grad = defs.append("linearGradient")
    .attr("id","gpaGrad")
    .attr("x1","0%").attr("x2","0%")
    .attr("y1","100%").attr("y2","0%");

  for (let i=0;i<=10;i++){
    const t = i/10;
    const v = gpaExtent[0] + t*(gpaExtent[1]-gpaExtent[0]);
    grad.append("stop")
      .attr("offset", `${t*100}%`)
      .attr("stop-color", color(v));
  }

  legend.append("rect")
    .attr("x",0).attr("y",10)
    .attr("width", lgW).attr("height", lgH)
    .attr("fill","url(#gpaGrad)")
    .attr("stroke","#999");

  legend.append("text")
    .attr("x", lgW+10).attr("y", 20)
    .attr("font-size",14).attr("fill","#333")
    .text(gpaExtent[1].toFixed(2));

  legend.append("text")
    .attr("x", lgW+10).attr("y", 10+lgH)
    .attr("font-size",14).attr("fill","#333")
    .text(gpaExtent[0].toFixed(2));

  // axis hint
  svg.append("text")
    .attr("x", center.x)
    .attr("y", H-25)
    .attr("text-anchor","middle")
    .attr("font-size",18)
    .attr("font-weight",800)
    .attr("fill","#333")
    .text("Radius = Sleep Hours");

}).catch(err=>{
  msg.style.color = "#b00";
  msg.textContent = "CSV load failed: " + err;
  console.error(err);
});
</script>

</body>
</html>
